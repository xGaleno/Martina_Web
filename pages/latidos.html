
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz 8 meses, Martineishon</title>

    <!-- Tipografía Poppins desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Estilos CSS unificados -->
    <style>
        /* === Variables CSS === */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f0f0f0;
            --neon-color: #8a2be2;
            --neon-glow: rgba(138, 43, 226, 0.3);
            --neon-glow-strong: rgba(138, 43, 226, 0.5);
            --font-family-poppins: 'Poppins', sans-serif;
            --neon-border-width: 2px;
            --neon-shadow-soft: 
                0 0 8px var(--neon-glow),
                0 0 15px var(--neon-glow),
                0 0 25px var(--neon-glow-strong);
            --neon-shadow-strong: 
                0 0 10px var(--neon-glow),
                0 0 20px var(--neon-glow),
                0 0 35px var(--neon-glow-strong);
        }
        
        /* === Estilos generales y base === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #120429, #000000, #120429);
            color: var(--text-color);
            font-family: var(--font-family-poppins);
            min-height: 100vh;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 105, 180, 0.1), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* === Layout principal === */
        .container {
            display: flex;
            flex-direction: column;
            width: 90vw;
            max-width: 1200px;
            height: 90vh;
            max-height: 800px;
            gap: 20px;
        }
        
        /* === Componentes === */
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-color), 0 0 10px var(--neon-glow);
            color: #fff;
            display: flex;
            align-items: center;
        }
        
        .brand::before {
            content: "💗";
            margin-right: 8px;
            color: #ff69b4;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        
        .menu a {
            color: #ccc;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .menu a::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon-color);
            bottom: -5px;
            left: 0;
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.3s ease;
        }
        
        .menu a:hover {
            color: var(--neon-color);
        }
        
        .menu a:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }
        
        .hero {
            position: relative;
            flex-grow: 1;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #heart {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
        }
        
        .title {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .title h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 700;
            text-shadow: 0 0 10px var(--neon-color), 0 0 20px var(--neon-glow-strong);
            animation: pulse-title 2s infinite alternate;
        }
        
        @keyframes pulse-title {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.05); opacity: 1; }
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: white;
            font-size: 3rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 20;
            padding: 10px;
            opacity: 0.7;
            transition: opacity 0.3s, transform 0.2s, text-shadow 0.3s;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .nav-arrow:hover {
            opacity: 1;
            transform: translateY(-50%) scale(1.1);
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 1),
                0 0 25px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 255, 255, 0.6);
        }

        .nav-arrow.left { left: 20px; }
        .nav-arrow.right { right: 20px; }

        .neon-border {
            position: relative;
            border: var(--neon-border-width) solid var(--neon-color);
            box-shadow: var(--neon-shadow-soft);
            border-radius: 10px;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            background-clip: padding-box;
        }
        
        .neon-border:hover {
            box-shadow: var(--neon-shadow-strong);
            transform: translateY(-2px);
        }
        
        /* Media Queries para responsividad */
        @media (max-width: 768px) {
            .container {
                width: 95vw;
                gap: 10px;
            }
            .navbar {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .menu {
                flex-direction: column;
                gap: 10px;
            }
            .nav-arrow { font-size: 2rem; }
            .nav-arrow.left { left: 10px; }
            .nav-arrow.right { right: 10px; }
            .hero { height: 500px; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Música de fondo -->
    <audio id="background-music" loop autoplay muted>
        <source src="../assets/audio/Humbe.mp3" type="audio/mpeg">
    </audio>

    <main class="container">
        <!-- Navbar con efecto neon -->
        <nav class="navbar neon-border">
            <div class="brand">MARTINA</div>
            <ul class="menu">
                <li><a href="../index.html">INICIO</a></li>
                <li><a href="../pages/historia.html">HISTORIA</a></li>
                <li><a href="/pages/juego.html">JUEGO</a></li>
            </ul>
        </nav>

        <!-- Hero con corazón y título -->
        <section class="hero neon-border">
            <canvas id="heart"></canvas>
            <!-- Flechas de navegación -->
            <button class="nav-arrow left">‹</button>
            <button class="nav-arrow right">›</button>
            <div class="title">
                <div class="placeholder-space"></div>
            </div>
        </section>
    </main>

    <!-- Script de JavaScript unificado -->
    <script>
        /* FAST Heart Particles — Optimized for mobile/GPUs
           - Pre-rendered sprites (sharp + glow)
           - Capped DPR
           - Fewer particles by default
           - Added strong, automatic heartbeat pulse
        */
        (() => {
            // === Variables globales y referencias ===
            const cnv = document.getElementById('heart');
            const ctx = cnv.getContext('2d', { alpha: false });
            const heroSection = document.querySelector('.hero');
            const leftArrow = document.querySelector('.nav-arrow.left');
            const rightArrow = document.querySelector('.nav-arrow.right');
            
            // Estado de la página: 'heart' o 'gift'
            let currentView = 'heart';

            // === Rendimiento y Constantes ===
            const DPR_CAP = 1.25;
            const COUNT = 850;
            const REPULSE_RADIUS = 120;
            const RETURN_SPRING = 0.06;
            const FRICTION = 0.86;
            const REVEAL_SPEED = 0.014;
            const THICKNESS = 0.03;
            const PULSE_INTERVAL = 800;
            const PULSE_DURATION = 150;

            const COLOR = '#8a2be2';
            const COLOR_SOFT = '#9326f8ff';
            const BG = '#000';

            let DPR = Math.min(DPR_CAP, window.devicePixelRatio || 1);
            let dotSprite, glowSprite;
            let bgFill = null;

            let particles = [];
            let pointer = { x: 0, y: 0, down: false, inside: false };
            let pulse = 0, revealT = 0;
            let lastPulseTime = 0;

            let animationId = null;
            let isRunning = false;

            // === Funciones auxiliares ===

            // Crear sprite de partícula (con o sin glow)
            function makeDot(radius = 2, glow = false) {
                const s = Math.ceil((radius + (glow ? 16 : 0)) * 2);
                const off = document.createElement('canvas');
                off.width = off.height = s;
                const c = off.getContext('2d');

                c.translate(s / 2, s / 2);
                if (glow) {
                    c.shadowColor = COLOR_SOFT;
                    c.shadowBlur = 16;
                }
                c.fillStyle = COLOR;
                c.beginPath();
                c.arc(0, 0, radius, 0, Math.PI * 2);
                c.fill();

                return off;
            }

            // Puntos del corazón (ecuación paramétrica)
            function heartPoint(t, scale, cx, cy) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                return { x: cx + (x * scale), y: cy - (y * scale) };
            }

            // Re-construir canvas y partículas
            function rebuildHeart() {
                const w = cnv.width / DPR;
                const h = cnv.height / DPR;

                const g = ctx.createRadialGradient(w * 0.5, h * 0.5, Math.min(w, h) * 0.1, w * 0.5, h * 0.5, Math.max(w, h) * 0.6);
                g.addColorStop(0, BG);
                g.addColorStop(1, BG);
                bgFill = g;

                dotSprite = makeDot(1.8, false);
                glowSprite = makeDot(1.8, true);

                const scale = Math.min(w, h) * 0.02;
                const cx = w * 0.5;
                const cy = h * 0.55;

                particles = [];
                for (let i = 0; i < COUNT; i++) {
                    const t = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.003;
                    const p = heartPoint(t, scale, cx, cy);
                    const angle = t + Math.PI / 2;
                    const r = (Math.random() * 2 - 1) * THICKNESS * Math.min(w, h);
                    const tx = p.x + Math.cos(angle) * r;
                    const ty = p.y + Math.sin(angle) * r;

                    particles.push({
                        x: cx + (Math.random() - 0.5) * 10,
                        y: cy + (Math.random() - 0.5) * 10,
                        vx: 0, vy: 0,
                        tx, ty,
                        order: i / COUNT,
                        size: 1 + Math.random() * 1.2
                    });
                }
                revealT = 0;
            }

            // Resize responsive
            function resize() {
                DPR = Math.min(DPR_CAP, window.devicePixelRatio || 1);
                const rect = cnv.parentElement.getBoundingClientRect();
                const w = rect.width;
                const h = rect.height;

                cnv.width = Math.floor(w * DPR);
                cnv.height = Math.floor(h * DPR);
                cnv.style.width = `${w}px`;
                cnv.style.height = `${h}px`;
                ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

                if (currentView === 'heart') {
                    rebuildHeart();
                }
            }

            // Manejo del puntero
            function onPointer(e) {
                pointer.down = e.type === 'pointerdown' ? true :
                    e.type === 'pointerup' ? false : pointer.down;

                if (e.type === 'pointerenter') pointer.inside = true;
                if (e.type === 'pointerleave') { pointer.inside = false; pointer.down = false; }

                if (['pointermove', 'pointerdown', 'pointerup'].includes(e.type)) {
                    const rect = cnv.getBoundingClientRect();
                    pointer.x = (e.clientX - rect.left);
                    pointer.y = (e.clientY - rect.top);
                }

                if (e.type === 'click' || e.type === 'pointerdown') {
                    pulse = 1;
                }
            }

            // Bucle principal de animación
            function step() {
                const now = performance.now();
                const w = cnv.width / DPR;
                const h = cnv.height / DPR;
                const cx = w * 0.5;
                const cy = h * 0.55;

                if (now - lastPulseTime > PULSE_INTERVAL) {
                    pulse = 1;
                    lastPulseTime = now;
                }

                if (pulse > 0) {
                    const elapsed = now - lastPulseTime;
                    if (elapsed < PULSE_DURATION) {
                        pulse = 1;
                    } else {
                        pulse = Math.max(0, pulse - 0.045 * ((elapsed - PULSE_DURATION) / 16));
                    }
                }

                ctx.fillStyle = bgFill;
                ctx.fillRect(0, 0, w, h);

                if (revealT < 1) {
                    revealT = Math.min(1, revealT + REVEAL_SPEED);
                }

                const pulseFactor = 1 + pulse * 1.2;
                const spring = RETURN_SPRING * (1 + pulse * 0.6);
                const repulseBoost = pulse * 0.8;

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];

                    if (p.order <= revealT) {
                        p.vx += (p.tx - p.x) * spring;
                        p.vy += (p.ty - p.y) * spring;
                    }

                    const dxCenter = p.x - cx;
                    const dyCenter = p.y - cy;
                    const distCenter = Math.sqrt(dxCenter * dxCenter + dyCenter * dyCenter);
                    if (distCenter < 200) {
                        const force = (120 * repulseBoost) / (distCenter + 10);
                        p.vx += (dxCenter / distCenter) * force;
                        p.vy += (dyCenter / distCenter) * force;
                    }

                    if (pointer.inside) {
                        const dx = p.x - pointer.x;
                        const dy = p.y - pointer.y;
                        const d2 = dx * dx + dy * dy;
                        const R2 = REPULSE_RADIUS * REPULSE_RADIUS;
                        if (d2 < R2) {
                            const dist = Math.max(12, Math.sqrt(d2));
                            const force = (1100 / (dist * dist)) * (1 + pulse * 0.5);
                            p.vx += (dx / dist) * force;
                            p.vy += (dy / dist) * force;
                        }
                    }

                    p.vx *= FRICTION;
                    p.vy *= FRICTION;
                    p.x += p.vx;
                    p.y += p.vy;
                }

                const k = 1 + pulse * 1.4;
                const glowAlpha = 0.7 + pulse * 0.3;

                ctx.globalAlpha = glowAlpha;
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const gw = glowSprite.width;
                    const gh = glowSprite.height;
                    ctx.drawImage(glowSprite, p.x - gw / 2, p.y - gh / 2);
                }
                ctx.globalAlpha = 1;

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const s = p.size * k;
                    const dw = dotSprite.width * (s / 1.8);
                    const dh = dotSprite.height * (s / 1.8);
                    ctx.drawImage(dotSprite, p.x - dw / 2, p.y - dh / 2, dw, dh);
                }

                animationId = requestAnimationFrame(step);
            }
            
            // --- NUEVAS FUNCIONES PARA LOS VIDEOS ---
            
            function stopHeartAnimation() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    isRunning = false;
                }
            }

            function showGift() {
                stopHeartAnimation();
                cnv.style.display = 'none';

                const oldGift = document.getElementById('gift-video-container');
                if (oldGift) oldGift.remove();

                const videoContainer = document.createElement('div');
                videoContainer.id = 'gift-video-container';
                videoContainer.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    border-radius: 10px;
                    overflow: hidden;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 5;
                    pointer-events: none;
                `;
                
                const floresVideo = document.createElement('video');
                floresVideo.autoplay = true;
                floresVideo.loop = true;
                floresVideo.muted = true;
                floresVideo.playsInline = true;
                floresVideo.style.cssText = `
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                    position: absolute;
                    top: 0;
                    left: 0;
                    z-index: 1;
                `;
                floresVideo.innerHTML = `<source src="../assets/video/flores.mp4" type="video/mp4">`;
                videoContainer.appendChild(floresVideo);

                const ninaVideo = document.createElement('video');
                ninaVideo.autoplay = true;
                ninaVideo.loop = true;
                ninaVideo.muted = true;
                ninaVideo.playsInline = true;
                ninaVideo.style.cssText = `
                    width: 50%;
                    height: auto;
                    border-radius: 50%;
                    border: 2px solid #8a2be2;
                    box-shadow: 
                        0 0 8px rgba(138, 43, 226, 0.6),
                        0 0 15px rgba(138, 43, 226, 0.4);
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    z-index: 2;
                `;
                ninaVideo.innerHTML = `<source src="../assets/video/nina.mp4" type="video/mp4">`;
                videoContainer.appendChild(ninaVideo);

                heroSection.appendChild(videoContainer);
                currentView = 'gift';
            }

            // --- Control de navegación ---

            document.addEventListener('DOMContentLoaded', () => {
                rightArrow.addEventListener('click', showGift);

                leftArrow.addEventListener('click', () => {
                    currentView = 'heart';
                    const giftVideoContainer = document.getElementById('gift-video-container');
                    if (giftVideoContainer) {
                        giftVideoContainer.remove();
                    }
                    cnv.style.display = 'block';
                    rebuildHeart();
                    step();
                });
            });

            // --- Inicialización y Eventos ---
            resize();
            step();

            window.addEventListener('resize', resize);
            cnv.addEventListener('pointerenter', onPointer);
            cnv.addEventListener('pointerleave', onPointer);
            cnv.addEventListener('pointermove', onPointer);
            cnv.addEventListener('pointerdown', onPointer);
            cnv.addEventListener('pointerup', onPointer);
            cnv.addEventListener('click', onPointer);
            cnv.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
        })();
    </script>
</body>
</html>
