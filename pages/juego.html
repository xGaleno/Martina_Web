<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'; img-src 'self'; media-src 'self'; frame-ancestors 'none'" />
  <title>JUEGO - Martina</title>

  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->
  <!-- Capas de diseño (base → transiciones → lógica de juego) -->
  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->

  <link rel="stylesheet" href="../assets/css/historia.css" />
  <link rel="stylesheet" href="../assets/css/animaciones.css" />
  <link rel="stylesheet" href="../assets/css/juego.css" />
  <link rel="stylesheet" href="../assets/css/responsive-base.css" />
</head>

<body>

  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->
  <!-- Música de fondo (controlada por interacción del usuario) -->
  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->

  <audio id="background-music" loop muted>
    <source src="../assets/audio/Humbe.mp3" type="audio/mpeg" />
    Tu navegador no soporta el elemento de audio.
  </audio>

  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->
  <!-- Contenedor principal de la página -->
  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->

  <main class="container">

    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->
    <!-- Consistencia con el resto del sitio -->
    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->

    <nav class="navbar neon-border">
      <div class="brand">MARTINA</div>
      <ul class="menu">
        <li><a href="../index.html">INICIO</a></li>
        <li><a href="historia.html">HISTORIA</a></li>
        <li><a href="#" class="active" aria-current="page">JUEGO</a></li>
      </ul>
    </nav>

    <!-- ─────────────────────── 🦖 SECCIÓN DEL JUEGO ─────────────────────── -->
    <!-- Instrucciones + área interactiva -->
    <!-- ─────────────────────── 🦖 SECCIÓN DEL JUEGO ─────────────────────── -->

    <section class="story-content neon-border" aria-label="Juego del Ninasaurio">
      <h1>JUEGO DEL NINASAURIO</h1>
      <p>
        Presiona <strong>ESPACIO</strong> para saltar y esquivar los cactus.  
        ¡Demuestra cuánto puedes aguantar!
      </p>

      <!-- Contenedor del juego (estructura semántica mínima para CSS/JS) -->
      <div class="game-wrapper">
        <div class="contenedor-juego" role="application" aria-label="Área de juego del Ninasaurio">
          <div class="suelo" aria-hidden="true"></div>
          <div class="dino dino-corriendo" aria-label="Ninasaurio"></div>
          <div class="score" aria-live="polite">0</div>
          <div class="game-over" aria-live="assertive" hidden>GAME OVER</div>
        </div>
      </div>
    </section>

  </main>

  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
  <!-- Módulos funcionales (ordenados por dependencia) -->
  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
   
  <script src="../assets/js/musica.js"></script>   <!-- Activa audio tras primera interacción -->
  <script src="../assets/js/juego.js"></script>    <!-- Lógica principal del juego Dino -->

</body>
</html>
