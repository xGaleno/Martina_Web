<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz 8 meses, Martineishon</title>

  <!-- ─────────────────────── 🔤 FUENTES ─────────────────────── -->
  <!-- Tipografía Poppins (ligera precarga para rendimiento) -->
  <!-- ─────────────────────── 🔤 FUENTES ─────────────────────── -->
   
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->
  <!-- Módulos temáticos (menú → corazón → escena de regalo) -->
  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->

  <link rel="stylesheet" href="../assets/css/regalos_menu.css" />
  <link rel="stylesheet" href="../assets/css/regalos_corazon.css" />
  <link rel="stylesheet" href="../assets/css/regalos_flores.css" />
  <link rel="stylesheet" href="../assets/css/responsive-base.css" />
</head>

<body>

  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->
  <!-- Música de fondo (inicialmente silenciada) -->
  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->

  <audio id="background-music" loop muted>
    <source src="../assets/audio/Humbe.mp3" type="audio/mpeg" />
    Tu navegador no soporta el elemento de audio.
  </audio>

  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->
  <!-- Contenedor principal de la página -->
  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->

  <main class="container fade-in-up" style="animation-delay: 0.1s">

    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->
    <!-- Consistencia con el resto del sitio -->
    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->

    <nav class="navbar neon-border fade-in-up" style="animation-delay: 0.2s">
      <div class="brand">MARTINA</div>
      <ul class="menu">
        <li><a href="../index.html">INICIO</a></li>
        <li><a href="../pages/historia.html">HISTORIA</a></li>
        <li><a href="../pages/juego.html">JUEGO</a></li>
      </ul>
    </nav>

    <!-- ─────────────────────── 💖 HERO ─────────────────────── -->
    <!-- Escena interactiva (corazón animado + navegación) -->
    <!-- ─────────────────────── 💖 HERO ─────────────────────── -->

    <section class="hero neon-border fade-in-up" style="animation-delay: 0.4s" aria-label="Escena interactiva de regalo">
      <!-- Canvas para la animación del corazón -->
      <canvas id="heart" aria-hidden="true"></canvas>

      <!-- Controles de navegación entre vistas -->
      <button class="nav-arrow left fade-in-up" style="animation-delay: 0.6s" aria-label="Volver a la animación del corazón">‹</button>
      <button class="nav-arrow right fade-in-up" style="animation-delay: 0.6s" aria-label="Ver escena de regalo con videos">›</button>

      <!-- Espacio reservado para título dinámico (usado por JS si se implementa) -->
      <div class="title" aria-hidden="true">
        <div class="placeholder-space"></div>
      </div>
    </section>

  </main>

  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
  <!-- Módulos funcionales (cargan tras el HTML, sin bloquear) -->
  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
   
  <script src="../assets/js/regalos_corazon.js" defer></script> <!-- Módulo de animación del corazón -->
  <script src="../assets/js/regalos_flores.js" defer></script>   <!-- Módulo de escena de video (flores + niña) -->
  <script src="../assets/js/regalos_menu.js" defer></script>     <!-- Lógica de navegación y control global -->

</body>
</html>
