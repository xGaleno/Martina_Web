<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primer Año de Conocernos - Martina</title>

  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->
  <!-- Capas de diseño modular (base → componentes → efectos) -->
  <!-- ─────────────────────── 🎨 ESTILOS ─────────────────────── -->

  <link rel="stylesheet" href="assets/css/index.css" />
  <link rel="stylesheet" href="assets/css/imagenes.css" />
  <link rel="stylesheet" href="assets/css/animaciones.css" />
</head>

<body>

  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->
  <!-- Música de fondo (controlado por script externo) -->
  <!-- ─────────────────────── 🎵 AUDIO ─────────────────────── -->

  <audio id="background-music" loop muted>
    <source src="assets/audio/Musica.mp3" type="audio/mpeg" />
    Tu navegador no soporta el elemento de audio.
  </audio>

  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->
  <!-- Contenedor principal de la página -->
  <!-- ─────────────────────── 🧱 CONTENEDOR PRINCIPAL ─────────────────────── -->

  <main class="container">

    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->
    <!-- Identidad y enlaces principales -->
    <!-- ─────────────────────── 🧭 BARRA DE NAVEGACIÓN ─────────────────────── -->

    <nav class="navbar neon-border">
      <div class="brand">MARTINA</div>
      <ul class="menu">
        <li><a href="index.html" class="active">INICIO</a></li>
        <li><a href="pages/historia.html">HISTORIA</a></li>
        <li><a href="pages/juego.html">JUEGO</a></li>
      </ul>
    </nav>

    <!-- ─────────────────────── 💖 HERO ─────────────────────── -->
    <!-- Mensaje central + llamado a la acción -->
    <!-- ─────────────────────── 💖 HERO ─────────────────────── -->

    <section class="hero neon-border">
      <div class="hero-content">
        <h1>Primer Año Juntos</h1>
        <p>
          Este primer año ha sido solo el comienzo.  
          Y aunque el tiempo pase, quiero que sepas que cada día, elegiré amarte un poco más,  
          cuidarte un poco más, y vivir cada instante contigo como si fuera el primero… y el más importante.
        </p>
        <button class="btn-shop" onclick="window.location.href='pages/regalos.html'">
          REGALOS PARA MI AMOR
        </button>
      </div>
      <div class="hero-image-container">
        <img src="assets/img/menu/martina.png" alt="Martina" class="hero-image" loading="lazy" />
      </div>
    </section>

    <!-- ─────────────────────── 📸 GALERÍA 1 ─────────────────────── -->
    <!-- Recuerdos del Primer Año -->
    <!-- ─────────────────────── 📸 GALERÍA 1 ─────────────────────── -->

    <section class="gallery-section" aria-label="Recuerdos del primer año">
      <div class="gallery-slider neon-border fade-in">
        <div class="gallery-content">
          <!-- Imágenes numeradas para facilitar mantenimiento -->
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (1).png" alt="Foto 1 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (2).png" alt="Foto 2 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (3).png" alt="Foto 3 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (4).png" alt="Foto 4 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (5).png" alt="Foto 5 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (6).png" alt="Foto 6 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (7).png" alt="Foto 7 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (8).png" alt="Foto 8 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (9).png" alt="Foto 9 del primer año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/primer_año/Primer_Año (10).png" alt="Foto 10 del primer año" loading="lazy" /></div>
        </div>
      </div>
    </section>

    <!-- ─────────────────────── ✨ SEPARADOR VISUAL ─────────────────────── -->
    <!-- Separador visual entre galerías -->
    <!-- ─────────────────────── ✨ SEPARADOR VISUAL ─────────────────────── -->

    <div class="gallery-divider" aria-hidden="true"></div>

    <!-- ─────────────────────── 📸 GALERÍA 2 ─────────────────────── -->
    <!-- Recuerdos del Segundo Año -->
    <!-- ─────────────────────── 📸 GALERÍA 2 ─────────────────────── -->

    <section class="gallery-section" aria-label="Recuerdos del segundo año">
      <div class="gallery-slider neon-border fade-in">
        <div class="gallery-content">
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (1).png" alt="Foto 1 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (2).png" alt="Foto 2 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (3).png" alt="Foto 3 del segundo año" loading="lazy" /></div>

          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (6).png" alt="Foto 6 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (7).png" alt="Foto 7 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (8).png" alt="Foto 8 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (9).png" alt="Foto 9 del segundo año" loading="lazy" /></div>
          <div class="gallery-item"><img src="assets/img/segundo_año/Segundo_Año (10).png" alt="Foto 10 del segundo año" loading="lazy" /></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
  <!-- Módulos funcionales (ordenados por propósito) -->
  <!-- ─────────────────────── 💻 SCRIPTS ─────────────────────── -->
   
  <script src="assets/js/musica.js"></script>      <!-- Control de audio -->
  <script src="assets/js/imagenes.js"></script>    <!-- Galería interactiva -->

</body>
</html>
